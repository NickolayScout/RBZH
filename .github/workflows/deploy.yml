name: Deploy to Neocities

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp rubezh.html deploy/index.html
          cp cheatsheet.html deploy/cheatsheet.html

      - name: Upload to Neocities
        run: |
          curl -s \
            -F "index.html=@deploy/index.html" \
            -F "cheatsheet.html=@deploy/cheatsheet.html" \
            "https://neocities.org/api/upload" \
            -H "Authorization: Bearer ${{ secrets.NEOCITIES_API_TOKEN }}" \
            | tee /tmp/neocities_response.json
          if grep -q '"result":"success"' /tmp/neocities_response.json; then
            echo "Deploy successful"
          else
            echo "Deploy failed" && cat /tmp/neocities_response.json && exit 1
          fi
